  <rect x="158" y="262" width="56" height="186" rx="9" fill="#34d399"/>
  <rect x="158" y="250" width="56" height="20" rx="7" fill="#10b981"/>
  <rect x="172" y="274" width="30" height="4" rx="2" fill="rgba(0,0,0,.1)"/>
  <rect x="172" y="286" width="24" height="4" rx="2" fill="rgba(0,0,0,.1)"/>
  <!-- Book 3: white/cream (center, tallest) -->
