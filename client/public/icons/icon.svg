  <rect x="239" y="281" width="30" height="5" rx="2.5" fill="#0f766e" opacity=".2"/>
  <rect x="239" y="295" width="22" height="5" rx="2.5" fill="#0f766e" opacity=".15"/>
  <!-- Book 4: coral/pink -->
  <rect x="298" y="262" width="56" height="186" rx="9" fill="#fb7185"/>
  <rect x="298" y="250" width="56" height="20" rx="7" fill="#f43f5e"/>
  <rect x="312" y="274" width="30" height="4" rx="2" fill="rgba(0,0,0,.1)"/>
  <rect x="312" y="286" width="24" height="4" rx="2" fill="rgba(0,0,0,.1)"/>
