      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners (app icon style) -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
