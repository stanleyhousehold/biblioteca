<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (maskable: Android applies its own mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Content within the safe zone (center ~80% = 409x409, offset ~51px) -->
  <circle cx="256" cy="340" r="160" fill="rgba(255,255,255,.06)"/>
  <!-- Book 1: amber -->
  <rect x="110" y="300" width="48" height="148" rx="8" fill="#fbbf24"/>
  <rect x="110" y="289" width="48" height="18" rx="6" fill="#f59e0b"/>
  <!-- Book 2: teal-green -->
  <rect x="168" y="274" width="52" height="174" rx="8" fill="#34d399"/>
  <rect x="168" y="263" width="52" height="18" rx="6" fill="#10b981"/>
  <!-- Book 3: white/cream (center, tallest) -->
  <rect x="230" y="246" width="52" height="202" rx="8" fill="#f0fdfa"/>
  <rect x="230" y="235" width="52" height="18" rx="6" fill="#ccfbf1"/>
  <rect x="243" y="264" width="26" height="4" rx="2" fill="#0f766e" opacity=".25"/>
  <rect x="243" y="276" width="20" height="4" rx="2" fill="#0f766e" opacity=".2"/>
  <rect x="243" y="288" width="23" height="4" rx="2" fill="#0f766e" opacity=".2"/>
  <!-- Book 4: coral/pink -->
  <rect x="292" y="274" width="52" height="174" rx="8" fill="#fb7185"/>
  <rect x="292" y="263" width="52" height="18" rx="6" fill="#f43f5e"/>
  <!-- Book 5: purple -->
  <rect x="354" y="300" width="48" height="148" rx="8" fill="#a78bfa"/>
  <rect x="354" y="289" width="48" height="18" rx="6" fill="#8b5cf6"/>
  <!-- Shelf -->
  <rect x="90" y="446" width="332" height="13" rx="6.5" fill="rgba(255,255,255,.3)"/>
</svg>
